<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucas Resell — Waitlist</title>
  <meta name="description" content="Join the Inner Circle waitlist" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    main {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Background grain */
    .bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .bg::before {
      content: '';
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(110,110,110,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 70% 60%, rgba(23,23,23,0.3) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(4,4,4,0.5) 0%, transparent 70%);
      animation: drift 20s ease-in-out infinite alternate;
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }
    @keyframes drift {
      0% { transform: translate(-5%, -5%) rotate(-3deg); }
      100% { transform: translate(5%, 5%) rotate(3deg); }
    }

    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hero {
      padding: 68px 1rem 1.5rem;
    }
    .hero h1 {
      max-width: 670px;
      font-size: 52.8px;
      line-height: 58.08px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(167deg, #fff 0%, #919191 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 auto;
    }
    .hero p {
      margin: 25px auto 0;
      max-width: 510px;
      font-size: 20px;
      line-height: 30px;
      color: #d4d4d4;
    }

    .form-section {
      width: 100%;
    }
    .form-section h1 {
      font-size: 47.8px;
      line-height: 52.58px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #969696 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }
    .form-box {
      max-width: 400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .form-box input {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid rgba(57, 255, 20, 0.3);
      border-radius: 0.5rem;
      font-size: 1rem;
      text-align: center;
      background: rgba(255,255,255,0.04);
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-box input:focus {
      border-color: #39ff14;
    }
    .form-box input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    .form-box button {
      background: linear-gradient(to bottom, #5bff3d, #39ff14, #22d600);
      color: #000;
      padding: 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: brightness 0.2s;
    }
    .form-box button:hover {
      filter: brightness(1.1);
    }

    .testimonials {
      padding: 38px 1rem;
      width: 100%;
    }
    .testimonials h2 {
      font-size: 47.8px;
      line-height: 52.58px;
      font-weight: 700;
      margin-bottom: 3rem;
    }
    .video-grid {
      max-width: 75%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
    }
    .video-grid > div {
      aspect-ratio: 16/9;
      border-radius: 0.75rem;
      overflow: hidden;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-grid > div::after {
      content: '▶';
      font-size: 2rem;
      color: rgba(255,255,255,0.3);
    }

    .cta {
      padding: 2rem 1rem;
      width: 100%;
    }
    .cta button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: linear-gradient(to bottom, #5bff3d, #39ff14, #22d600);
      color: #000;
      font-weight: 600;
      font-size: 0.875rem;
      border-radius: 14.4px;
      padding: 14.08px 18.4px;
      border: none;
      box-shadow:
        0 18px 40px -15px rgba(57,255,20,0.85),
        0 3px 6px 0 rgba(255,255,255,0.7) inset,
        0 -3px 6px 0 rgba(0,0,0,0.2) inset;
      transition: all 0.2s;
    }
    .cta button:hover {
      filter: brightness(1.1);
      transform: scale(1.02);
    }

    .wins {
      padding: 38px 1rem;
      width: 100%;
    }
    .wins h2 {
      font-size: 45.8px;
      line-height: 50.38px;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 2.5rem;
    }
    .wins-grid {
      max-width: 75%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    .wins-grid > div {
      aspect-ratio: 1/1;
      border-radius: 0.75rem;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }

    .footer {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 2.25rem 1rem;
    }
    .footer a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10.8px;
      font-size: 0.875rem;
      color: #919191;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover {
      color: #fff;
    }
    .footer a::after {
      content: '↗';
      font-size: 0.75rem;
    }

    @media (max-width: 640px) {
      .hero h1 { font-size: 36px; line-height: 42px; }
      .hero p { font-size: 17px; line-height: 26px; }
      .form-section h1 { font-size: 32px; line-height: 38px; }
      .testimonials h2 { font-size: 32px; line-height: 38px; }
      .wins h2 { font-size: 30px; line-height: 36px; }
      .video-grid { max-width: 100%; grid-template-columns: 1fr; }
      .wins-grid { max-width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <div class="bg" aria-hidden="true"></div>

    <div class="content">
      <!-- Hero -->
      <section class="hero">
        <h1>The Inner Circle Is Currently Closed</h1>
        <p>We're not accepting new applications right now, but join the waitlist below to be first in line when spots open up.</p>
      </section>

      <!-- Form -->
      <section class="form-section">
        <h1>Join the Waitlist</h1>
        <div class="form-box">
          <input type="email" placeholder="Enter your best email" />
          <button>Join Waitlist</button>
        </div>
      </section>

      <!-- Testimonials -->
      <section class="testimonials">
        <h2>Interviews with the Inner Circle:</h2>
        <div class="video-grid">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </section>

      <!-- CTA -->
      <section class="cta">
        <button>Get Started Now</button>
      </section>

      <!-- Wins -->
      <section class="wins">
        <h2>More Inner Circle Wins:</h2>
        <div class="wins-grid">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </section>

      <!-- CTA -->
      <section class="cta">
        <button>Get Started Now</button>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <a href="https://clyro.io/" target="_blank" rel="noopener noreferrer">Built using clyro</a>
      </footer>
    </div>
  </main>
</body>
</html>
